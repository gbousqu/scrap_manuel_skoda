<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_5e2a54ee763d285dac1445252f537058-7ecda209763d285dac144525071b4ae9-fr-FR"><p id="ID_d5f596ea763d285dac1445250361a401-7ecda209763d285dac144525071b4ae9-fr-FR"></p><div data-role="block" data-type="block" id="ID_e9e3bccf763d285dac1445255407c5f6-7ecda209763d285dac144525071b4ae9-fr-FR"><p data-type="p" id="ID_249aebe576bbbee3ac1445254e72bea0-7ecda209763d285dac144525071b4ae9-fr-FR">Le <span data-type="eigenname" data-class="vw-dir-ltr" id="d20024669e91168">Travel Assist</span> aide à maintenir le véhicule dans la voie tout en contrôlant sa vitesse ainsi que la distance par rapport aux véhicules qui précèdent.</p></div><div data-role="block" data-type="block" id="ID_cc903844836211ecbef8dc66952928bb-7ecda209763d285dac144525071b4ae9-fr-FR"><p data-type="p" id="ID_cc903845836211ecbef8dc66952928bb-7ecda209763d285dac144525071b4ae9-fr-FR">Dans les véhicules équipés du système <span data-type="eigenname" data-class="vw-dir-ltr" id="d20024669e91174">Side Assist</span>, il permet également un changement de voie assisté.</p></div><div></div></section></div></div></html>
