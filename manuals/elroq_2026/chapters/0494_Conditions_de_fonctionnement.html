<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_ede3e2de0d581af8ac1445256e659927-dd1da04aba7beb34ac144525576a806e-fr-FR"><p id="ID_91040e592954c12dac14452545e9cf19-dd1da04aba7beb34ac144525576a806e-fr-FR"></p><div data-role="block" data-type="block" id="ID_e1a65bc92954c12dac1445251dfa6239-dd1da04aba7beb34ac144525576a806e-fr-FR"><div data-role="list-container" data-class="vw-list-style-checklist" data-type="liste" id="ID_a71643bab8b4d6b7ac1445252ab4b759-dd1da04aba7beb34ac144525576a806e-fr-FR"><ul id="d2289431e31"><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_ce166de8b8b4d6b7ac1445250e19e8f5-dd1da04aba7beb34ac144525576a806e-fr-FR"><p data-type="p" id="ID_52035e415a6877d7ac1445257883178f-dd1da04aba7beb34ac144525576a806e-fr-FR">La vitesse du véhicule en marche arrière est inférieure à 10 km/h.</p></li><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_8d0dad1a27639294ac14452567f50d89-dd1da04aba7beb34ac144525576a806e-fr-FR"><p data-type="p" id="ID_496ba76661459b430adf42c72a8df1fa-dd1da04aba7beb34ac144525576a806e-fr-FR">L’<span data-type="eigenname" data-class="vw-dir-ltr" id="d8460880e109004">ASR</span> n’intervient pas.</p></li><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_e4c24a920f558d44ac1445252f7bb1d3-dd1da04aba7beb34ac144525576a806e-fr-FR"><p data-type="p" id="ID_1f6a53f90f558d44ac1445251fd549dc-dd1da04aba7beb34ac144525576a806e-fr-FR">Le conducteur n’intervient pas pendant le processus de braquage automatique.</p></li><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_65aba7040f558d44ac1445255604b2eb-dd1da04aba7beb34ac144525576a806e-fr-FR"><p data-type="p" id="ID_ac3a0f700f558d44ac14452550f09af5-dd1da04aba7beb34ac144525576a806e-fr-FR">Aucun accessoire n’est connecté à la prise de remorque.</p></li></ul></div></div><div></div></section></div></div></html>
