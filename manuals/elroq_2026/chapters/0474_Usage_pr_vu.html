<h1>Usage prévu</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_614e3b5c3d832b84ac14452511774910-5ccfbb5c3d832b84ac144525243a3f15-fr-FR"><p id="ID_48155c6a3d832b84ac144525522500ac-5ccfbb5c3d832b84ac144525243a3f15-fr-FR"></p><div data-role="block" data-type="block" id="ID_40568945a34711ea8add9ab9c9107ee0-5ccfbb5c3d832b84ac144525243a3f15-fr-FR"><p data-type="p" id="ID_40572586a34711ea8add9ab9c9107ee0-5ccfbb5c3d832b84ac144525243a3f15-fr-FR">L’assistant pour les situations d’urgence détecte l’inactivité du conducteur, qui peut être due par ex. à une perte de connaissance soudaine. Le système prend alors les mesures nécessaires pour ralentir le véhicule de façon aussi sécurisée que possible jusqu’à l’arrêt.</p></div><div></div></section></div></div></html>
