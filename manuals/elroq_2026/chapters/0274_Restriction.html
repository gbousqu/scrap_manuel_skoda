<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_53bf7a6ba941c6a9ac14452512d403f1-440a706b09794d44ac14452567d88361-fr-FR"><p id="ID_7d89afd5a941c6a9ac1445254a3f60c8-440a706b09794d44ac14452567d88361-fr-FR"></p><div data-role="block" data-type="block" id="ID_5e653372a941c6a9ac1445252d488f9e-440a706b09794d44ac14452567d88361-fr-FR"><p data-type="p" id="ID_2043d57ebdb076daac1445254cd4c76e-440a706b09794d44ac14452567d88361-fr-FR">Pour des raisons de sécurité, il n'est pas possible pour le conducteur de coupler de nouveaux appareils pendant la conduite. Le couplage en cours de route ne peut être effectué que par un passager.</p></div><div></div></section></div></div></html>
