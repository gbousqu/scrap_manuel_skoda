<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_ad12fe4e35a72d49ac1445256b072417-780ceedb09d448b8ac14452520f544b4-fr-FR"><p id="ID_a8f4716c35a72d49ac1445252136d577-780ceedb09d448b8ac14452520f544b4-fr-FR"></p><div data-role="block" data-type="block" id="ID_790cb7ea35a72d49ac14452564c99a8a-2ccc72f7e6899162ac1445250ecfe96a-fr-FR"><p data-type="p" id="ID_b62822813686cf1fac144525076a3bb0-2ccc72f7e6899162ac1445250ecfe96a-fr-FR">Les fonctions sont liées au véhicule et non au compte utilisateur principal. Elles ne peuvent pas être transférées vers un autre véhicule dans lequel l’utilisateur se connecte.</p></div><div></div></section></div></div></html>
