<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_18ad60170c38ac24ac14452509896b16-14a7905f09c34467ac1445256721b905-fr-FR"><p id="ID_57fe5cbd0c38ac24ac1445253183bebd-14a7905f09c34467ac1445256721b905-fr-FR"></p><div data-role="block" data-type="block" id="ID_9bd92d1a30ece8f0ac1445250267aeec-cb3a0b5130ece8f0ac144525285d20e2-fr-FR"><p data-type="p" id="ID_0ba2d66b93ac3c60ac1445255b132ac6-cb3a0b5130ece8f0ac144525285d20e2-fr-FR">En mode <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e73161">Demo</span>, le guidage vers la destination sélectionnée est simulé.</p><p data-type="p" id="ID_786d5d8193ac3c60ac1445254eb6b199-cb3a0b5130ece8f0ac144525285d20e2-fr-FR">Lorsque la fonction est activée, le système d’infodivertissement demande, avant le démarrage du guidage, si le guidage doit s’effectuer normalement ou en mode <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e73166">Demo</span>.</p></div><div></div></section></div></div></html>
