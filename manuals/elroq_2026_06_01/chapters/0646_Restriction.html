<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_386a761f35bb2163ac14452529bb809f-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR"><p id="ID_54d1279b35bb2163ac14452571efc35e-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR"></p><div data-role="block" data-type="block" id="ID_2ad38dd435bb2163ac14452503676037-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR"><p data-type="p" id="ID_dfe3d4998e6a449bac1445255f49861c-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR">L’adaptateur ne peut pas être utilisé simultanément avec du courant alternatif (CA).</p></div><div data-role="block" data-type="block" id="ID_5ed215008e2fe4f6c0a8013b019079ef-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR"><p data-type="p" id="ID_def53aa38e6ad768ac144525353d09f0-e9d0774635c2d4b2ac1445255ff65b7d-fr-FR">L’adaptateur ne peut être utilisé en même temps que la prise de courant 230 V dans le coffre à bagages que si le courant total ne dépasse pas 16 A.</p></div><div></div></section></div></div></html>
