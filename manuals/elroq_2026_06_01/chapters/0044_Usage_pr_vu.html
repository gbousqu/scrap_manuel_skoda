<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_6953177f36270625ac1445251a018eae-8a51f2ef36270625ac1445250bc0bbc4-fr-FR"><p id="ID_32aa955636270625ac1445252d88cb25-8a51f2ef36270625ac1445250bc0bbc4-fr-FR"></p><div data-role="block" data-type="block" id="ID_dcd095e66b281c7cac144525309039dc-8a51f2ef36270625ac1445250bc0bbc4-fr-FR"><p data-type="p" id="ID_a25b024e6b281c7dac14452565837b10-8a51f2ef36270625ac1445250bc0bbc4-fr-FR">La clé numérique remplace la clé physique. Après l’activation et l’enregistrement sur un appareil mobile compatible (téléphone mobile, montre connectée), elle permet de verrouiller et de déverrouiller le véhicule ainsi que de mettre le contact.</p></div><div></div></section></div></div></html>
