<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_e76d414b0b52cbb3ac1445253111670b-1d84080b8e95dc43ac1445257bceed13-fr-FR"><p id="ID_513e1f740b52cbb3ac1445253307c35d-1d84080b8e95dc43ac1445257bceed13-fr-FR"></p><div data-role="block" data-type="block" id="ID_5e653372a941c6a9ac1445252d488f9e-1d84080b8e95dc43ac1445257bceed13-fr-FR"><p data-type="p" id="ID_2043d57ebdb076daac1445254cd4c76e-1d84080b8e95dc43ac1445257bceed13-fr-FR">Pour des raisons de sécurité, le conducteur ne peut pas écrire <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e64206">SMS</span> pendant la marche. Seul le passager avant <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e64209">SMS</span> peut écrire pendant la marche.</p></div><div></div></section></div></div></html>
