<h1>Tenue correcte du volant</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_301b0db50e9d29f8ac1445252a319c54-ae77ad110e9d29f8ac14452501fd6be7-fr-FR"><p id="ID_e7cfa8310e9d29f8ac1445253ead2d3d-ae77ad110e9d29f8ac14452501fd6be7-fr-FR"></p><div data-role="block" data-type="block" id="ID_2eeb820b619ada7c0adf42c736d193cf-ae77ad110e9d29f8ac14452501fd6be7-fr-FR" hasIllu="true"><p data-type="p" id="ID_f3c214fdb69daf51ac1445255abc2571-ae77ad110e9d29f8ac14452501fd6be7-fr-FR">Une mauvaise tenue du volant peut entraîner des blessures graves aux bras, aux mains et à la tête en cas de déploiement de l'airbag.</p><div data-type="illu" id="ID_46cbcca1619ada7c0adf42c76a4983ac-ae77ad110e9d29f8ac14452501fd6be7-fr-FR"><div data-class="vw-layout-half_column" data-dl-wrapper="figure" id="d2280503e39"><figure id="ID_7b8fcb8d71c7fbf9ac1445251970a37c-ae77ad110e9d29f8ac14452501fd6be7-fr-FR" data-role="" data-type="" data-position=""><div><a data-fancybox="group" media-link="" class="fancybox" data-href="../media/img03a01f2024256631ac14452511655e63_2_--_--_PNG_3x.png" data-options="{&#34;buttons&#34;:[&#34;fullScreen&#34;, &#34;thumbs&#34;, &#34;close&#34;],&#34;hash&#34;:false}"><img id="ID_7b8fcb8d71c7fbf9ac1445251970a37c-ae77ad110e9d29f8ac14452501fd6be7-fr-FR" data-type="bild" data-role="" data-position="" media-link="" class="content blockimage" data-src="../media/img03a01f2024256631ac14452511655e63_2_--_--_PNG_3x.png"></img></a></div></figure></div></div><div data-role="list-container" data-class="vw-list-style-bulleted" data-type="liste" id="ID_52b9787ca7cbb796ac14452560604680-ae77ad110e9d29f8ac14452501fd6be7-fr-FR"><ul id="d2280503e57"><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_b3fbca30a7cbb796ac1445253bf70181-ae77ad110e9d29f8ac14452501fd6be7-fr-FR"><p data-type="p" id="ID_396235ab619ada7c0adf42c76d123e22-ae77ad110e9d29f8ac14452501fd6be7-fr-FR">Maintenir le volant latéralement des deux mains sur le bord extérieur dans les positions « 9 heures » et « 3 heures ».</p></li></ul></div></div><div></div></section></div></div></html>
