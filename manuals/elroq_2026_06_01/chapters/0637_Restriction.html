<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_386a761f35bb2163ac14452529bb809f-e491587035bfe4faac1445257396b8f6-fr-FR"><p id="ID_54d1279b35bb2163ac14452571efc35e-e491587035bfe4faac1445257396b8f6-fr-FR"></p><div data-role="block" data-type="block" id="ID_2ad38dd435bb2163ac14452503676037-e491587035bfe4faac1445257396b8f6-fr-FR"><p data-type="p" id="ID_fe0cc32fff4b3367ac14452507e425b9-e491587035bfe4faac1445257396b8f6-fr-FR">La fonction peut être indisponible par exemple dans les situations suivantes :</p><div data-role="list-container" data-class="vw-list-style-bulleted" data-type="liste" id="ID_cd168740ff4b3367ac14452533ce356d-e491587035bfe4faac1445257396b8f6-fr-FR"><ul id="d2292143e38"><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_d3b260eeff4b3367ac1445250266a400-e491587035bfe4faac1445257396b8f6-fr-FR"><p data-type="p" id="ID_135980d8ff4b3367ac1445257cdfac4e-e491587035bfe4faac1445257396b8f6-fr-FR">Le véhicule est rechargé avec du courant alternatif (CA).</p></li><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_50a87875ff4b3367ac1445255ab09781-e491587035bfe4faac1445257396b8f6-fr-FR"><p data-type="p" id="ID_c543299aff4b3367ac1445251817a4e7-e491587035bfe4faac1445257396b8f6-fr-FR">En cas d’utilisation d’une prise de courant ou d’un adaptateur <span data-type="eigenname" data-class="vw-dir-ltr" id="d8460880e140546">V2L</span>, le courant total dépasse 16 A.</p></li></ul></div></div><div></div></section></div></div></html>
