<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_5180d2c10b7aefefac1445255906d686-e4a7913f09a367d7ac1445253478f2fc-fr-FR"><p id="ID_462e4ea30b7aefefac1445253e8433f2-e4a7913f09a367d7ac1445253478f2fc-fr-FR"></p><div data-role="block" data-type="block" id="ID_a84a004c55ededdeac14452532041a71-e4a7913f09a367d7ac1445253478f2fc-fr-FR"><p data-type="titel" data-role="bridgehead" id="ID_37f7e51b1e5f11e9a44fb50d4618d468-e4a7913f09a367d7ac1445253478f2fc-fr-FR">Passer à un autre appareil</p><p data-type="p" data-dl-break-before="avoid" id="ID_37f7e51c1e5f11e9a44fb50d4618d468-e4a7913f09a367d7ac1445253478f2fc-fr-FR">L'infodivertissement vous permet de basculer entre les appareils actuellement connectés.</p><div data-role="list-container" data-class="vw-list-style-action" data-type="liste" id="ID_7c7a42babb67d439ac1445255a9f1dcd-e4a7913f09a367d7ac1445253478f2fc-fr-FR"><ul id="d5504657e43"><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_1e0c1002bb67d439ac1445252004baf8-e4a7913f09a367d7ac1445253478f2fc-fr-FR"><p data-type="p" id="ID_ef85d3151e2c11e9abb5ae1c38d5e1d2-e4a7913f09a367d7ac1445253478f2fc-fr-FR">Dans l’application <span data-type="eigenname" data-class="vw-dir-ltr" id="d6149195e70700">SmartLink</span>, sélectionner l’appareil souhaité dans le menu de l’appareil actuellement utilisé ou du dernier appareil connecté.</p></li></ul></div></div><div></div></section></div></div></html>
