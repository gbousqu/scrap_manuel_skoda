<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_d2e475794c11e7f2ac1445257b154d54-ddd050514c11e7f2ac14452563e6b229-fr-FR"><p id="ID_6a2d804f4c11e7f2ac1445254b6d3780-ddd050514c11e7f2ac14452563e6b229-fr-FR"></p><div data-role="block" data-type="block" id="ID_e5a3d1844b6f07daac1445257bdcfd60-ddd050514c11e7f2ac14452563e6b229-fr-FR"><p data-type="p" id="ID_98e71556d5d8255b0adf42c703973ca3-ddd050514c11e7f2ac14452563e6b229-fr-FR">Le système peut par ex. être restreint ou indisponible en cas de fort ensoleillement.</p><div data-role="info-container" data-class="info-container" data-type="tipp" id="ID_86210755d8034714ac1445255b37ded7-b0a65214d8034714ac1445253933b4ce-fr-FR"><div data-dl-wrapper="info-icon" id="d5502653e36"><div data-dl-role="info-icon" id="d5502653e37"></div></div><img id="d5502653e50" data-type="icon" data-role="icon" class="icon" data-class="" media-link="" data-src="../media/ansi-s6_3x.svg"></img><p data-type="p" id="ID_f0ea99d04fb0baa3ac1445255aad0bcb-b0a65214d8034714ac1445253933b4ce-fr-FR">Les lunettes de soleil à filtres polarisants peuvent affecter négativement la perception visuelle de l’écran.</p></div></div><div></div></section></div></div></html>
