<h1>Réglages</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_ea3cc80a2f6ad6a40adf42c703614758-2c310d982f6ad6a40adf42c7349d81a3-fr-FR"><p id="ID_193ccb742f6ad6a40adf42c753a061d3-2c310d982f6ad6a40adf42c7349d81a3-fr-FR"></p><div data-role="block" data-type="block" id="ID_3ff6c7632f6ad6a40adf42c774377590-2c310d982f6ad6a40adf42c7349d81a3-fr-FR"><p data-type="p" id="ID_1b421ce42f8302600adf42c70cb22251-2c310d982f6ad6a40adf42c7349d81a3-fr-FR">Si le capot du coffre à bagages est déverrouillé avec la touche <span data-type="farbe" data-class="vw-color-black symbol" id="d2160341e35"><img id="ID_eb2631c02f8302600adf42c726ab6646-2c310d982f6ad6a40adf42c7349d81a3-fr-FR" data-type="symbol" data-role="symbol" class="symbol" data-class="vw-symbol vw-color-black" media-link="" data-src="../media/imga052e4e22f8033600adf42c7271ecd90_2_--_--_vw_Symbol_SVG_online_3x.svg"></img></span> de la clé, le capot est verrouillé automatiquement après la fermeture.</p><p data-type="p" id="ID_c4bcce3e2f8302600adf42c77563c12b-2c310d982f6ad6a40adf42c7349d81a3-fr-FR">Le délai après lequel le capot est verrouillé automatiquement après la fermeture peut être réglé par un atelier spécialisé.</p></div><div></div></section></div></div></html>
