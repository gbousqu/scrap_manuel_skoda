<h1>Mode de fonctionnement</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_11b6bab7e6534546ac1445251d36be73-7ebba3f9666c4c2aac1445254bea9382-fr-FR"><p id="ID_b854ec05e6534546ac1445254de34ef9-7ebba3f9666c4c2aac1445254bea9382-fr-FR"></p><div data-role="block" data-type="block" id="ID_c2c233ad788a8d05ac14452567e26ef8-7ebba3f9666c4c2aac1445254bea9382-fr-FR"><p data-type="p" id="ID_809cc72c1a8611eb951bbfaf3a7e5a40-7ebba3f9666c4c2aac1445254bea9382-fr-FR">Les pneus <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e128759">SEAL</span> ont une résistance accrue aux fuites d’air lorsqu’ils sont perforés.</p></div><div data-role="block" data-type="block" id="ID_0bd4996012a811eb883ed988e5033537-7ebba3f9666c4c2aac1445254bea9382-fr-FR"><p data-type="p" id="ID_0bd4996212a811eb883ed988e5033537-7ebba3f9666c4c2aac1445254bea9382-fr-FR">Lors du remplacement des pneus <span data-type="eigenname" data-class="vw-dir-ltr" id="d9794160e128767">SEAL</span> par des pneus standard, le véhicule doit être équipé de l’un kit en cas de panne.</p></div><div></div></section></div></div></html>
