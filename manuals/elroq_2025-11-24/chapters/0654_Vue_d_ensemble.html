<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_7ba96557bf38c1d4ac14452514008281-f20a48d98c296faaac1445253319061c-fr-FR"><p id="ID_db53c851bf38c1d4ac144525270ee1b0-f20a48d98c296faaac1445253319061c-fr-FR"></p><div data-role="block" data-type="block" id="ID_14ae5d3b62fb11f08a98f76351527faa-f20a48d98c296faaac1445253319061c-fr-FR"><p data-type="p" id="ID_14ae5d3c62fb11f08a98f76351527faa-f20a48d98c296faaac1445253319061c-fr-FR">À l'usine, des autocollants et des panneaux se trouvent sous le capot avant et sur certaines pièces du véhicule et contiennent des informations importantes pour le fonctionnement du véhicule.</p><div data-role="list-container" data-class="vw-list-style-bulleted" data-type="liste" id="ID_14ae844d62fb11f08a98f76351527faa-f20a48d98c296faaac1445253319061c-fr-FR"><ul id="d2171753e40"><li data-type="punkt" data-dl-li-containing-no-list="true" id="ID_14aeab5e62fb11f08a98f76351527faa-f20a48d98c296faaac1445253319061c-fr-FR"><p data-type="p" id="ID_14aeab5f62fb11f08a98f76351527faa-f20a48d98c296faaac1445253319061c-fr-FR">Ne jamais retirer les autocollants et les panneaux. Ceux-ci doivent rester lisibles.</p></li></ul></div></div><div></div></section></div></div></html>
