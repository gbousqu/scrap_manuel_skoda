<h1>Mode de fonctionnement</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_196381cece30795a0adf42c70258dab9-1f95d08cce30795a0adf42c724942b24-fr-FR"><p id="ID_bc42d033ce30795a0adf42c77582069c-1f95d08cce30795a0adf42c724942b24-fr-FR"></p><div data-role="block" data-type="block" id="ID_400e5912df1e1161ac1445252e556ab8-1f95d08cce30795a0adf42c724942b24-fr-FR"><p data-type="p" id="ID_7d459871376d11ee89c38beb43256441-1f95d08cce30795a0adf42c724942b24-fr-FR"> En marche arrière, la zone derrière le véhicule est affichée à l’écran d’infodivertissement avec des lignes d’orientation.</p></div><div data-role="block" data-type="block" id="ID_1c10296ddc9a11efa3b294045b05bdbe-1f95d08cce30795a0adf42c724942b24-fr-FR"><div data-role="info-container" data-class="info-container" data-type="tipp" id="ID_1c192a1edc9a11efa3b294045b05bdbe-1f95d08cce30795a0adf42c724942b24-fr-FR"><div data-dl-wrapper="info-icon" id="d2168666e44"><div data-dl-role="info-icon" id="d2168666e45"></div></div><img id="d2168666e51" data-type="icon" data-role="icon" class="icon" data-class="" media-link="" data-src="../media/ansi-s6_3x.svg"></img><p data-type="p" id="ID_1c192a1fdc9a11efa3b294045b05bdbe-1f95d08cce30795a0adf42c724942b24-fr-FR">La caméra est équipée d'un système de nettoyage. Le nettoyage a lieu automatiquement avec le lavage de la lunette arrière.</p></div></div><div></div></section></div></div></html>
