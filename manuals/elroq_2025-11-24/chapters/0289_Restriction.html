<h1>Restriction</h1>
<html data-dyxml-version="2"><div lang="fr-FR"><div class="topic-content"><section data-type="topic-allgemein" data-dl-contains="block" id="ID_0c3c44640b5e7636ac1445257777dd92-57421e498e9647d2ac1445252edcd661-fr-FR"><p id="ID_d6a0ddc60b5e7636ac144525189fe70b-57421e498e9647d2ac1445252edcd661-fr-FR"></p><div data-role="block" data-type="block" id="ID_b880d1bdff6e11ef9373c567f2fa283c-57421e498e9647d2ac1445252edcd661-fr-FR"><p data-type="p" id="ID_b880d1beff6e11ef9373c567f2fa283c-57421e498e9647d2ac1445252edcd661-fr-FR">Pour des raisons de sécurité, il n’est pas possible pour le conducteur d’écrire un e-mail pendant qu’il conduit. Seul le passager avant peut écrire un e-mail pendant le trajet.</p></div><div></div></section></div></div></html>
